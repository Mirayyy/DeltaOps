<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>DeltaOps</title>
    <script>
      // GitHub Pages SPA redirect
      // Redirects all 404s to index.html with the path preserved in the query string.
      // index.html then restores the clean URL via history.replaceState().
      var pathSegmentsToKeep = 0; // custom domain serves the app from /
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
