<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="../icons/logo.png" alt="DELTA" class="logo">
      <div class="header-text">
        <span class="header-tag">DELTA</span>
        <span class="header-label">Parsing</span>
      </div>
    </header>

    <!-- ═══ MISSIONS ═══ -->
    <section class="section">
      <div class="section-label">Миссии <span class="section-hint">— открытая страница</span></div>
      <div class="slot-grid">
        <div class="slot-card">
          <div class="slot-card-title">Пятница 1</div>
          <div class="slot-card-actions">
            <button class="btn btn-slot-action" data-slot="friday_1" data-mode="info">Обновить инфо</button>
            <button class="btn btn-slot-action btn-slot-mission" data-slot="friday_1" data-mode="mission">Обновить миссию</button>
          </div>
        </div>
        <div class="slot-card">
          <div class="slot-card-title">Суббота 1</div>
          <div class="slot-card-actions">
            <button class="btn btn-slot-action" data-slot="saturday_1" data-mode="info">Обновить инфо</button>
            <button class="btn btn-slot-action btn-slot-mission" data-slot="saturday_1" data-mode="mission">Обновить миссию</button>
          </div>
        </div>
        <div class="slot-card">
          <div class="slot-card-title">Пятница 2</div>
          <div class="slot-card-actions">
            <button class="btn btn-slot-action" data-slot="friday_2" data-mode="info">Обновить инфо</button>
            <button class="btn btn-slot-action btn-slot-mission" data-slot="friday_2" data-mode="mission">Обновить миссию</button>
          </div>
        </div>
        <div class="slot-card">
          <div class="slot-card-title">Суббота 2</div>
          <div class="slot-card-actions">
            <button class="btn btn-slot-action" data-slot="saturday_2" data-mode="info">Обновить инфо</button>
            <button class="btn btn-slot-action btn-slot-mission" data-slot="saturday_2" data-mode="mission">Обновить миссию</button>
          </div>
        </div>
      </div>
      <button id="btn-all" class="btn btn-all">Загрузить все автоматически</button>
    </section>

    <!-- ═══ SIDE PICKER (shown after single mission parse) ═══ -->
    <section id="side-picker" class="section" style="display: none">
      <div class="section-label">Назначить стороны</div>
      <div id="side-list" class="side-list"></div>
      <div class="side-actions">
        <button id="btn-skip-sides" class="btn btn-skip-sides">Пропустить</button>
        <button id="btn-save-sides" class="btn btn-save-sides">Сохранить</button>
      </div>
    </section>

    <footer>
      <div id="status" class="status">Готово</div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
